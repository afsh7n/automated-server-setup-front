events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name emeax.com www.emeax.com;

        # Onomis React
        location /preview/onomis-react/ {
            alias /usr/share/nginx/html/onomis-react/;
            try_files $uri /index.html;
        }

        # Onomis Vue
        location /preview/onomis-vue/ {
            alias /usr/share/nginx/html/onomis-vue/;
            try_files $uri /index.html;
        }

        # Onomis Docs
        location /preview/onomis-docs/ {
            alias /usr/share/nginx/html/onomis-docs/;
            try_files $uri $uri/ /index.html;
        }

        # Onomis Landing (HTML Project)
        location /onomis/ {
            alias /usr/share/nginx/html/onomis/;
            try_files $uri $uri/ =404;
        }

        # Emeax Landing (HTML Project)
        location / {
            alias /usr/share/nginx/html/emeax/;
            try_files $uri $uri/ =404;
        }

        # Cache-Control Headers (Optional, for performance optimization)
        location ~*  \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
