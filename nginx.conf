events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name emeax.com www.emeax.com;

        # Onomis React
        location /preview/onomis-react {
            alias /usr/share/nginx/html/onomis-react/dist/;  # یا build بسته به مسیر خروجی
            try_files $uri $uri/ /index.html;
        }

        # Onomis Vue
        location /preview/onomis-vue {
            alias /usr/share/nginx/html/onomis-vue/dist/;  # مسیر خروجی درست را مشخص کنید
            try_files $uri $uri/ /index.html;
        }

        # Onomis Docs
        location /preview/onomis-docs {
            alias /usr/share/nginx/html/onomis-docs/;
            try_files $uri $uri/ =404;
        }

        # Onomis Landing
        location /onomis {
            alias /usr/share/nginx/html/onomis/;
            try_files $uri $uri/ =404;
        }

        # Emeax Landing (root)
        location / {
            alias /usr/share/nginx/html/emeax/;
            try_files $uri $uri/ =404;
        }
    }
}
