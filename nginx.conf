events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name emeax.com www.emeax.com;

        # Onomis React
        location /preview/onomis-react {
            proxy_pass http://onomis_react:3000;
            rewrite ^/preview/onomis-react(/.*)?$ $1 break;
        }

        # Onomis Vue
        location /preview/onomis-vue {
            proxy_pass http://onomis_vue:8080;
            rewrite ^/preview/onomis-vue(/.*)?$ $1 break;
        }

        # Onomis Docs
        location /preview/onomis-docs {
            alias /usr/share/nginx/html/onomis-docs/;
            try_files $uri $uri/ =404;
        }

        # Onomis Landing
        location /onomis {
            alias /usr/share/nginx/html/onomis/;
            try_files $uri $uri/ =404;
        }

        # Emeax Landing (root)
        location / {
            alias /usr/share/nginx/html/emeax/;
            try_files $uri $uri/ =404;
        }
    }
}
