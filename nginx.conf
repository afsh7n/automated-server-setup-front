events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name emeax.com www.emeax.com;

        location /preview/onomis-react/ {
            alias /usr/share/nginx/html/onomis-react/dist/;
            try_files $uri $uri/ /index.html;
        }

        location /preview/onomis-vue/ {
            alias /usr/share/nginx/html/onomis-vue/dist/;
            try_files $uri $uri/ /index.html;
        }

        location /preview/onomis-docs/ {
            alias /usr/share/nginx/html/onomis-docs/.vitepress/dist/;
            try_files $uri $uri/ /index.html;
        }

        location /onomis/ {
            alias /usr/share/nginx/html/onomis/;
            try_files $uri $uri/ =404;
        }

        location / {
            alias /usr/share/nginx/html/emeax/;
            try_files $uri $uri/ =404;
        }
    }
}
