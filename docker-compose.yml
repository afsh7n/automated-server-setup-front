version: '3.8'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./src/onomis:/usr/share/nginx/html/onomis
      - ./src/emeax:/usr/share/nginx/html/emeax
    ports:
      - "80:80"
    depends_on:
      - onomis_react
      - onomis_vue
      - onomis_docs

  onomis_react:
    build:
      context: .
      dockerfile: docker/Dockerfile.react
    volumes:
      - onomis-react-build:/usr/share/nginx/html/onomis-react

  onomis_vue:
    build:
      context: .
      dockerfile: docker/Dockerfile.vue
    volumes:
      - onomis-vue-build:/usr/share/nginx/html/onomis-vue

  onomis_docs:
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    volumes:
      - onomis-docs-build:/usr/share/nginx/html/onomis-docs

volumes:
  onomis-react-build:
  onomis-vue-build:
  onomis-docs-build:
