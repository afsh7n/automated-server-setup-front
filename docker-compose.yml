version: '3.8'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./src:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - onomis_react
      - onomis_vue

  onomis_react:
    image: nginx:alpine
    container_name: onomis_react
    volumes:
      - ./src/onomis-react:/usr/share/nginx/html
    expose:
      - "3000:3000"

  onomis_vue:
    image: nginx:alpine
    container_name: onomis_vue
    volumes:
      - ./src/onomis-vue:/usr/share/nginx/html
    expose:
      - "8080:8080"
