version: '3.8'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./src:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - onomis_react
      - onomis_vue
      - onomis_docs

  onomis_react:
    image: node:16-alpine
    container_name: onomis_react
    working_dir: /usr/src/app
    volumes:
      - ./src/onomis-react:/usr/src/app
    ports:
      - "3000:3000"
    command: >
      sh -c "npm install && npm run build && npm install -g serve && serve -s build"
    expose:
      - "3000"

  onomis_vue:
    image: node:16-alpine
    container_name: onomis_vue
    working_dir: /usr/src/app
    volumes:
      - ./src/onomis-vue:/usr/src/app
    ports:
      - "8080:8080"
    command: >
      sh -c "npm install && npm run build && npm install -g serve && serve -s dist"
    expose:
      - "8080"

  onomis_docs:
    image: node:16-alpine
    container_name: onomis_docs
    working_dir: /usr/src/app
    volumes:
      - ./src/onomis-docs:/usr/src/app
    expose:
      - "3001"
    command: >
      sh -c "npm install && npm run docs:build"