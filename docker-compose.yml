version: '3'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./src/landing-page-html:/usr/share/nginx/html/landing-page
      - ./src/main-page-html:/usr/share/nginx/html/main-page
      - react-app:/usr/share/nginx/html/react-app
      - vue-app:/usr/share/nginx/html/vue-app
    depends_on:
      - react-app
      - vue-app

  react-app:
    build:
      context: ./src/react-app
    container_name: react-app-container
    ports:
      - "3000:3000"
    command: npm start

  vue-app:
    build:
      context: ./src/vue-app
    container_name: vue-app-container
    ports:
      - "8080:8080"
    command: npm run serve

volumes:
  react-app:
  vue-app:
