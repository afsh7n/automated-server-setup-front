version: '3.8'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./src/onomis:/usr/share/nginx/html/onomis
      - ./src/emeax:/usr/share/nginx/html/emeax
    ports:
      - "80:80"
    depends_on:
      - onomis_react
      - onomis_vue
      - onomis_docs

  onomis_react:
    build:
      context: .
      dockerfile: docker/Dockerfile.react
    volumes:
      - ./src/onomis-react/dist:/usr/share/nginx/html/onomis-react
    expose:
      - "3000"

  onomis_vue:
    build:
      context: .
      dockerfile: docker/Dockerfile.vue
    volumes:
      - ./src/onomis-vue/dist:/usr/share/nginx/html/onomis-vue
    expose:
      - "8080"

  onomis_docs:
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    volumes:
      - ./src/onomis-docs/.vitepress/dist:/usr/share/nginx/html/onomis-docs
    expose:
      - "3001"
