version: '3.8'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - onomis-react-build:/usr/share/nginx/html/onomis-react
      - onomis-vue-build:/usr/share/nginx/html/onomis-vue
      - onomis-docs-build:/usr/share/nginx/html/onomis-docs
      - ./src/onomis:/usr/share/nginx/html/onomis
      - ./src/emeax:/usr/share/nginx/html/emeax
    ports:
      - "80:80"

  onomis_react_builder:
    build:
      context: .
      dockerfile: docker/Dockerfile.react
    volumes:
      - onomis-react-build:/usr/src/app/dist
    command: ["/bin/true"]

  onomis_vue_builder:
    build:
      context: .
      dockerfile: docker/Dockerfile.vue
    volumes:
      - onomis-vue-build:/usr/src/app/dist
    command: ["/bin/true"]

  onomis_docs_builder:
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    volumes:
      - onomis-docs-build:/usr/src/app/.vitepress/dist
    command: ["/bin/true"]

volumes:
  onomis-react-build:
  onomis-vue-build:
  onomis-docs-build:
