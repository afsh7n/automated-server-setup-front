version: '3.8'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./src/onomis-react/dist:/usr/share/nginx/html/onomis-react
      - ./src/onomis-vue/dist:/usr/share/nginx/html/onomis-vue
      - ./src/onomis-docs/.vitepress/dist:/usr/share/nginx/html/onomis-docs
    ports:
      - "80:80"
    depends_on:
      - onomis_react
      - onomis_vue
      - onomis_docs

  onomis_react:
    build:
      context: .
      dockerfile: docker/Dockerfile.react
    container_name: onomis_react
    volumes:
      - ./src/onomis-react:/usr/src/app
    command: npm run build

  onomis_vue:
    build:
      context: .
      dockerfile: docker/Dockerfile.vue
    container_name: onomis_vue
    volumes:
      - ./src/onomis-vue:/usr/src/app
    command: npm run build

  onomis_docs:
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    container_name: onomis_docs
    volumes:
      - ./src/onomis-docs:/usr/src/app
    command: npm run docs:build
