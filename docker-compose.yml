version: '3.8'

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./src:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - onomis_react
      - onomis_vue
      - onomis_docs

  onomis_react:
    build:
      context: .
      dockerfile: docker/Dockerfile.react
    container_name: onomis_react
    expose:
      - "3000"
    ports:
      - "3000:3000"

  onomis_vue:
    build:
      context: .
      dockerfile: docker/Dockerfile.vue
    container_name: onomis_vue
    expose:
      - "8080"
    ports:
      - "8080:8080"

  onomis_docs:
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    container_name: onomis_docs
    expose:
      - "3001"
    ports:
      - "3001:3001"
